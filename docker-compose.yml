services:
  compliance-mcp:
    build: .
    image: compliance-agent-mcp:latest
    container_name: compliance-mcp
    ports:
      - "8765:8765"
    restart: unless-stopped
    volumes:
      # Read-only access to framework questionnaire templates
      - ./frameworks:/app/frameworks:ro
      # Mount your Google service account JSON (set GOOGLE_CREDENTIALS_PATH=/run/secrets/google_sa.json)
      # - ~/.config/compliance-agent/google_sa.json:/run/secrets/google_sa.json:ro
    environment:
      MCP_PORT: "8765"
      PYTHONUNBUFFERED: "1"
      # ── Anthropic ──────────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ""
      # ── AWS ────────────────────────────────────────────────────────────────────
      # Prefer IAM role (ECS/EC2) or aws-vault. Set AWS_PROFILE if using named profile.
      AWS_REGION: "us-east-1"
      AWS_PROFILE: ""
      # ── env0 ───────────────────────────────────────────────────────────────────
      ENV0_API_KEY: ""
      ENV0_ORG_ID: ""
      # ── GitHub ─────────────────────────────────────────────────────────────────
      GITHUB_TOKEN: ""
      GITHUB_ORG: ""
      # ── Okta ───────────────────────────────────────────────────────────────────
      OKTA_DOMAIN: ""
      OKTA_API_TOKEN: ""
      # ── Google Workspace / Drive ────────────────────────────────────────────────
      GOOGLE_CREDENTIALS_PATH: ""
      GOOGLE_DRIVE_OWNER_EMAIL: ""
      # ── Atlassian (Jira + Confluence) ───────────────────────────────────────────
      ATLASSIAN_DOMAIN: ""
      ATLASSIAN_EMAIL: ""
      ATLASSIAN_API_TOKEN: ""
      # ── CrowdStrike (EDR + SIEM) ────────────────────────────────────────────────
      CROWDSTRIKE_CLIENT_ID: ""
      CROWDSTRIKE_CLIENT_SECRET: ""
      CROWDSTRIKE_BASE_URL: "https://api.crowdstrike.com"
      # ── Cloudflare ─────────────────────────────────────────────────────────────
      CLOUDFLARE_API_TOKEN: ""
      CLOUDFLARE_ACCOUNT_ID: ""
      # ── Snowflake ──────────────────────────────────────────────────────────────
      SNOWFLAKE_ACCOUNT: ""
      SNOWFLAKE_USER: ""
      SNOWFLAKE_PASSWORD: ""
      SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
      SNOWFLAKE_ROLE: "SECURITYADMIN"
      # ── Kandji ─────────────────────────────────────────────────────────────────
      KANDJI_API_TOKEN: ""
      KANDJI_SUBDOMAIN: ""
      # ── Semgrep ────────────────────────────────────────────────────────────────
      SEMGREP_API_TOKEN: ""
      SEMGREP_ORG_SLUG: ""
      # ── Lacework ───────────────────────────────────────────────────────────────
      LACEWORK_ACCOUNT: ""
      LACEWORK_API_KEY: ""
      LACEWORK_API_SECRET: ""
