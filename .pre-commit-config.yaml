repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "agent/", "mcp_server/", "-s", "B101"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast)
        entry: python -m pytest tests/ -x -q --no-header
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
